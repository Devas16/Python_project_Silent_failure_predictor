# ============================================================
# Silent Failure Predictor - Configuration File
# ============================================================

project:
  name: "Silent Failure Predictor"
  version: "1.0.0"
  description: "ML-based anomaly detection for system metrics"

# ----------------------------
# Data Generation Settings
# ----------------------------
data:
  n_samples: 2000          # Total number of time-series data points
  anomaly_fraction: 0.05   # ~5% of data will be injected anomalies
  random_seed: 42
  output_path: "data/system_metrics.csv"

  # Normal operating ranges
  metrics:
    cpu_usage:
      mean: 45.0
      std: 10.0
      min: 0.0
      max: 100.0
    memory_usage:
      mean: 55.0
      std: 8.0
      min: 0.0
      max: 100.0
    response_time_ms:
      mean: 200.0
      std: 40.0
      min: 50.0
      max: 5000.0
    disk_io_mbps:
      mean: 30.0
      std: 8.0
      min: 0.0
      max: 500.0
    network_latency_ms:
      mean: 15.0
      std: 5.0
      min: 1.0
      max: 500.0
    error_rate_pct:
      mean: 0.5
      std: 0.3
      min: 0.0
      max: 100.0

# ----------------------------
# Isolation Forest Settings
# ----------------------------
isolation_forest:
  contamination: 0.05      # Expected fraction of anomalies
  n_estimators: 200        # Number of trees
  max_samples: "auto"
  random_state: 42
  model_path: "models/isolation_forest.pkl"

# ----------------------------
# Autoencoder Settings
# ----------------------------
autoencoder:
  encoding_dim: 4          # Bottleneck dimension
  epochs: 50
  batch_size: 32
  validation_split: 0.1
  threshold_percentile: 95 # Reconstruction error threshold
  model_path: "models/autoencoder.h5"
  learning_rate: 0.001

# ----------------------------
# Feature Engineering
# ----------------------------
features:
  use_rolling_stats: true
  rolling_window: 10       # Window for rolling mean/std
  features_list:
    - "cpu_usage"
    - "memory_usage"
    - "response_time_ms"
    - "disk_io_mbps"
    - "network_latency_ms"
    - "error_rate_pct"

# ----------------------------
# Visualization Settings
# ----------------------------
visualization:
  output_dir: "outputs/"
  figure_dpi: 150
  style: "dark_background"
  anomaly_color: "#FF4B4B"
  normal_color: "#4B9CFF"
  figure_size: [18, 12]

# ----------------------------
# API Settings
# ----------------------------
api:
  host: "0.0.0.0"
  port: 8000
  reload: true
  log_level: "info"

# ----------------------------
# Logging Settings
# ----------------------------
logging:
  level: "INFO"            # DEBUG, INFO, WARNING, ERROR
  log_dir: "logs/"
  log_file: "app.log"
  rotation: "10 MB"
  retention: "7 days"
  format: "{time:YYYY-MM-DD HH:mm:ss} | {level} | {module}:{line} | {message}"

# ----------------------------
# Streamlit Dashboard
# ----------------------------
dashboard:
  refresh_interval_ms: 1000   # Simulated real-time refresh
  max_display_points: 200     # Points to show on chart
  alert_threshold: 3          # Consecutive anomalies to trigger alert
